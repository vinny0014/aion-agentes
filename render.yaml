services:
  - type: web
    name: aion-agentes-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_URL
        value: https://aion-news-os.vercel.app
      - key: CORS_ORIGINS
        value: https://aion-news-os.vercel.app
      - key: DATABASE_URL
        value: sqlite:////var/data/aion.db
    disk:
      name: aion-data
      mountPath: /var/data
      sizeGB: 1
