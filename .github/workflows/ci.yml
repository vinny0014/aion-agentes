name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Validate dependencies
        run: |
          pip check
          pip install pip-audit
          pip-audit -r backend/requirements.txt
      - name: Compile and test
        working-directory: backend
        run: |
          python -m compileall -q app scripts_seed.py
          python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22.x", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build and type-check
        working-directory: frontend
        run: |
          npm audit --audit-level=high
          npm run build
      - name: Smoke-test production preview
        working-directory: frontend
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/aion-vite-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid"' EXIT
          curl --fail --retry 10 --retry-delay 1 http://127.0.0.1:4173/
          curl --fail http://127.0.0.1:4173/articles

  deployment-config:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate Vercel JSON
        run: |
          python -m json.tool vercel.json >/dev/null
          python -m json.tool frontend/vercel.json >/dev/null
      - name: Reject static SEO feed shadowing
        run: |
          test ! -e frontend/public/robots.txt
          test ! -e frontend/public/sitemap.xml
          test ! -e frontend/public/news-sitemap.xml
          test ! -e frontend/public/image-sitemap.xml
          test ! -e frontend/public/rss.xml

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend
        run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with: { node-version: "22.x", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run browser journeys
        working-directory: frontend
        run: npm run test:e2e
