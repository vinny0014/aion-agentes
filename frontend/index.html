  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      // DISCOVERY GROWTH — integrações ativam sozinhas quando as credenciais
      // forem definidas nas variáveis de ambiente (ver PENDENCIAS_HUMANAS.md).
      const GA = import.meta.env.VITE_GA_MEASUREMENT_ID;
      const ADS = import.meta.env.VITE_ADSENSE_CLIENT;
      const CF = import.meta.env.VITE_CF_ANALYTICS_TOKEN;
      if (GA) {
        const s1 = document.createElement("script");
        s1.src = `https://www.googletagmanager.com/gtag/js?id=${GA}`;
        s1.async = true; document.head.appendChild(s1);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag("js", new Date()); gtag("config", GA);
      }
      if (ADS) {
        const s2 = document.createElement("script");
        s2.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${ADS}`;
        s2.async = true; s2.crossOrigin = "anonymous"; document.head.appendChild(s2);
      }
      if (CF) {
        const s3 = document.createElement("script");
        s3.src = "https://static.cloudflareinsights.com/beacon.min.js";
        s3.defer = true; s3.setAttribute("data-cf-beacon", JSON.stringify({ token: CF }));
        document.head.appendChild(s3);
      }
    </script>
